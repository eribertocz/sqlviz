[project]
name = "sqlviz-storage"
version = "0.1.0"
description = "SQLviz storage: .sqlviz project file and brain.duckdb"
requires-python = ">=3.12"
dependencies = [
    "sqlviz-core",
    "duckdb>=1.0",
    "bcrypt>=4.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sqlviz_storage"]

[tool.uv.sources]
sqlviz-core = { workspace = true }
