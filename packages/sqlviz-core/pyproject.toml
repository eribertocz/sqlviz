[project]
name = "sqlviz-core"
dynamic = ["version"]
description = "SQLviz kernel: contracts, registries, shared models"
requires-python = ">=3.12"
dependencies = []

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"

[tool.hatch.version.raw-options]
root = "../.."

[tool.hatch.build.targets.wheel]
packages = ["src/sqlviz_core"]
