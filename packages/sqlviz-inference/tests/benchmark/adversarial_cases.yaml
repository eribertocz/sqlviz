      - {yearmonth: 202405, total_sales: 103000}
      - {yearmonth: 202406, total_sales: 98000}
    expected_intent: comparison
    expected_chart: bar
    expected_quality_min: low
    reason: "V0 limitation: 'yearmonth' is ONE token (no underscore split) → not in temporal exact list → temporal NOT detected. Contrast with 'year_month' (splits to {year, month} → both in TEMPORAL_DIMENSION.contains → trend). Engine correctly gives comparison/bar for what it sees as integer GROUP BY."

