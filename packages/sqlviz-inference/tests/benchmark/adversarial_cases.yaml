    expected_intent: trend
    expected_chart: line
    expected_quality_min: medium
    reason: "user_id aggregated away in schema — 'dau' and 'fecha' don't match CUSTOMER_ENTITY → no_customer_entity penalty fires → retention ≈ 0 → trend wins"

  - id: adv_ret_003
    description: "Precomputed retention table without GROUP BY — detail not trend"
    sql: "SELECT cohort_month, retention_month_1, retention_month_3, retention_month_6 FROM retention_summary"
    schema:
      - {name: cohort_month,      type: DATE}
      - {name: retention_month_1, type: DOUBLE}
      - {name: retention_month_3, type: DOUBLE}
      - {name: retention_month_6, type: DOUBLE}
    data:
