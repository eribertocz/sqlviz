    sql: "SELECT e1.fecha AS first_purchase, COUNT(DISTINCT e2.customer_id) AS returning_customers FROM orders e1 JOIN orders e2 ON e1.customer_id = e2.customer_id AND e2.fecha > e1.fecha GROUP BY e1.fecha ORDER BY e1.fecha"
