  # ── CONFUSION 7: retention vs line (4 cases) ──────────────────────────────

  - id: adv_ret_001
    description: "Window function + customer_id in SELECT → retention"
    sql: "SELECT user_id, cohort_month, COUNT(*) OVER (PARTITION BY cohort_month) AS cohort_size, SUM(purchases) OVER (PARTITION BY user_id ORDER BY cohort_month) AS cumulative_purchases FROM user_metrics ORDER BY cohort_month, user_id"
    schema:
      - {name: user_id,               type: INTEGER}
      - {name: cohort_month,          type: DATE}
      - {name: cohort_size,           type: BIGINT}
      - {name: cumulative_purchases,  type: BIGINT}
    data:
      - {user_id: 1, cohort_month: "2024-01-01", cohort_size: 500, cumulative_purchases: 1}
      - {user_id: 1, cohort_month: "2024-02-01", cohort_size: 480, cumulative_purchases: 2}
      - {user_id: 2, cohort_month: "2024-01-01", cohort_size: 500, cumulative_purchases: 1}
      - {user_id: 2, cohort_month: "2024-03-01", cohort_size: 460, cumulative_purchases: 2}
    expected_intent: retention
    expected_chart: line
    expected_quality_min: medium
    reason: |
      user_id in SELECT → semantic engine detects CUSTOMER_ENTITY (dim34=1).
      cohort_month (DATE, contains 'month') → TEMPORAL_DIMENSION (dim31=1).
      PARTITION BY → has_window_function=1, has_partition_by=1.
      No GROUP BY → cohort group_by=0 → cohort score 0.45.
      retention: temporal×0.40 + customer×0.30 + window×0.20 + join×0 = 0.90.
      trend: temporal×0.40 + group_by×0 + aggregation×0.20 + order_by×0.10 = 0.70.
      retention (0.90) wins over trend (0.70) and cohort (0.45).

