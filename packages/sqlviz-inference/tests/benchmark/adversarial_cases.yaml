  # G1: YYYYMM fused token — engine limitation
  - id: adv_g_001
    description: "yearmonth (fused, no underscore) — comparison not trend (V0 limitation)"
    sql: "SELECT yearmonth, SUM(sales) AS total_sales FROM monthly GROUP BY yearmonth ORDER BY yearmonth"
    schema:
