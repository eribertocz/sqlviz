  # Funnel patterns (2 cases)

  - id: gc_g_013
    sql: "SELECT CASE WHEN step=1 THEN 'Captacion' WHEN step=2 THEN 'Calificacion' WHEN step=3 THEN 'Propuesta' ELSE 'Cierre' END AS fase, COUNT(*) AS leads FROM pipeline GROUP BY 1"
    schema:
      - {name: fase, type: VARCHAR}
      - {name: leads, type: BIGINT}
    data:
      - {fase: "Captacion", leads: 5000}
      - {fase: "Calificacion", leads: 2000}
      - {fase: "Propuesta", leads: 800}
      - {fase: "Cierre", leads: 200}
    expected_intent: funnel
    expected_chart: bar_horizontal
    min_quality: medium
    notes: "CASE WHEN 4-stage funnel — has_case_when=1 → funnel intent wins; label 'Calificacion' (12 chars) triggers bar_horizontal"

  - id: gc_g_014
    sql: "SELECT etapa_proceso, COUNT(*) AS total FROM leads GROUP BY etapa_proceso ORDER BY total DESC"
    schema:
      - {name: etapa_proceso, type: VARCHAR}
      - {name: total, type: BIGINT}
    data:
      - {etapa_proceso: "Captacion", total: 5000}
      - {etapa_proceso: "Calificacion", total: 2000}
      - {etapa_proceso: "Propuesta", total: 800}
      - {etapa_proceso: "Cierre", total: 300}
    expected_intent: comparison
    expected_chart: bar
    min_quality: medium
    notes: "Stage column WITHOUT CASE WHEN — has_case_when=0 → no_case_when penalty fires → funnel eliminated → comparison/bar"

