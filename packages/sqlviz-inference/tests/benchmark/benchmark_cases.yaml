    notes: "Filtered detail query"

  - id: detail_003
    sql: "SELECT order_id, product_name, quantity, unit_price FROM order_items LIMIT 100"
    schema:
      - {name: order_id, type: INTEGER}
      - {name: product_name, type: VARCHAR}
      - {name: quantity, type: INTEGER}
      - {name: unit_price, type: DOUBLE}
    expected_intent: detail
    expected_chart: table
    min_quality: medium
    notes: "LIMIT without ORDER BY DESC — not a ranking pattern, still detail"

  # ── Fase G: Doctoral benchmark extension (22 cases) ───────────────────────
  # DOC10 §Fase G — 8 patterns: comparison/composition boundary, ranking without
  # LIMIT, YYYYMM as INTEGER, percentages not summing to 100, real histogram vs
  # bucket table, funnel vs grouped count, scatter with genuine metrics, wide table

  # Comparison vs Composition boundary (5 cases)

  - id: gc_g_001
    sql: "SELECT payment_method, COUNT(*) AS orders FROM payments GROUP BY payment_method"
    schema:
      - {name: payment_method, type: VARCHAR}
      - {name: orders, type: BIGINT}
    data:
      - {payment_method: "Credit card", orders: 4200}
      - {payment_method: "Bank transfer", orders: 1800}
    expected_intent: composition
    expected_chart: pie
    min_quality: medium
    notes: "2 binary categories — low_cardinality fires (≤3) → composition wins → pie"

  - id: gc_g_002
    sql: "SELECT plan_type, COUNT(*) AS accounts FROM subscriptions GROUP BY plan_type"
    schema:
      - {name: plan_type, type: VARCHAR}
      - {name: accounts, type: BIGINT}
    data:
      - {plan_type: "Free", accounts: 5000}
      - {plan_type: "Pro", accounts: 1200}
      - {plan_type: "Enterprise", accounts: 300}
    expected_intent: composition
    expected_chart: pie
    min_quality: medium
    notes: "3 plan types — low_cardinality fires (≤3) → composition/pie not comparison"

  - id: gc_g_003
    sql: "SELECT department, SUM(budget) AS total_budget FROM budgets GROUP BY department"
    schema:
      - {name: department, type: VARCHAR}
      - {name: total_budget, type: DOUBLE}
    data:
      - {department: "Engineering", total_budget: 450000}
      - {department: "Marketing", total_budget: 280000}
      - {department: "Sales", total_budget: 380000}
      - {department: "Operations", total_budget: 210000}
      - {department: "Finance", total_budget: 190000}
      - {department: "HR", total_budget: 120000}
    expected_intent: comparison
    expected_chart: bar
    min_quality: medium
    notes: "6 departments SUM budget — cardinality 6 > 3, low_cardinality does not fire, comparison wins"

  - id: gc_g_004
    sql: "SELECT category, SUM(sales) AS total_sales FROM products GROUP BY category"
    schema:
      - {name: category, type: VARCHAR}
      - {name: total_sales, type: DOUBLE}
    data:
      - {category: "Electronics", total_sales: 120000}
      - {category: "Clothing", total_sales: 85000}
      - {category: "Food", total_sales: 95000}
      - {category: "Sports", total_sales: 62000}
      - {category: "Toys", total_sales: 43000}
      - {category: "Books", total_sales: 38000}
      - {category: "Home", total_sales: 71000}
      - {category: "Beauty", total_sales: 52000}
    expected_intent: comparison
    expected_chart: bar
    min_quality: medium
    notes: "8 categories — cardinality 8 > 3, low_cardinality off; pie_high_cardinality hard rule fires at >7 → pie eliminated"

  - id: gc_g_005
    sql: "SELECT segment, AVG(nps_score) AS avg_nps FROM surveys GROUP BY segment"
    schema:
      - {name: segment, type: VARCHAR}
      - {name: avg_nps, type: DOUBLE}
    data:
      - {segment: "Enterprise", avg_nps: 42.0}
      - {segment: "Mid-Market", avg_nps: 35.0}
      - {segment: "SMB", avg_nps: 28.0}
      - {segment: "Consumer", avg_nps: 31.0}
      - {segment: "Partner", avg_nps: 45.0}
    expected_intent: comparison
    expected_chart: bar
    min_quality: medium
    notes: "5 segments with AVG NPS — percentages not summing to 100; has_avg penalty suppresses composition → comparison wins"

  # YYYYMM as INTEGER temporal (3 cases)

  - id: gc_g_006
    sql: "SELECT year_month, SUM(revenue) AS monthly_revenue FROM sales GROUP BY year_month ORDER BY year_month"
    schema:
      - {name: year_month, type: INTEGER}
      - {name: monthly_revenue, type: DOUBLE}
    data:
      - {year_month: 202401, monthly_revenue: 85000}
      - {year_month: 202402, monthly_revenue: 92000}
      - {year_month: 202403, monthly_revenue: 88000}
      - {year_month: 202404, monthly_revenue: 97000}
      - {year_month: 202405, monthly_revenue: 103000}
      - {year_month: 202406, monthly_revenue: 98000}
    expected_intent: trend
    expected_chart: line
    min_quality: medium
    notes: "year_month INTEGER YYYYMM — token split gives {year, month}, both in TEMPORAL_DIMENSION.contains → temporal detected for INTEGER column"

  - id: gc_g_007
    sql: "SELECT periodo, SUM(ventas) AS ventas_periodo FROM ventas GROUP BY periodo ORDER BY periodo"
    schema:
      - {name: periodo, type: INTEGER}
      - {name: ventas_periodo, type: DOUBLE}
    data:
      - {periodo: 202401, ventas_periodo: 120000}
      - {periodo: 202402, ventas_periodo: 135000}
      - {periodo: 202403, ventas_periodo: 118000}
      - {periodo: 202404, ventas_periodo: 142000}
      - {periodo: 202405, ventas_periodo: 158000}
      - {periodo: 202406, ventas_periodo: 147000}
      - {periodo: 202407, ventas_periodo: 163000}
      - {periodo: 202408, ventas_periodo: 171000}
    expected_intent: trend
    expected_chart: line
    min_quality: medium
    notes: "periodo INTEGER — exact match in TEMPORAL_DIMENSION.exact set → temporal fires for INTEGER → trend/line"

  - id: gc_g_008
    sql: "SELECT month_year, SUM(orders) AS total_orders FROM orders GROUP BY month_year ORDER BY month_year"
    schema:
      - {name: month_year, type: INTEGER}
      - {name: total_orders, type: BIGINT}
    data:
      - {month_year: 202401, total_orders: 3400}
      - {month_year: 202402, total_orders: 2900}
      - {month_year: 202403, total_orders: 3700}
      - {month_year: 202404, total_orders: 4100}
      - {month_year: 202405, total_orders: 3800}
      - {month_year: 202406, total_orders: 4300}
      - {month_year: 202407, total_orders: 4600}
      - {month_year: 202408, total_orders: 4900}
    expected_intent: trend
    expected_chart: line
    min_quality: medium
    notes: "month_year INTEGER — token split gives {month, year}, both in TEMPORAL_DIMENSION.contains → temporal fires even for INTEGER type"

