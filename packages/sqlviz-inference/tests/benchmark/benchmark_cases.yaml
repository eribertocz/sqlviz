  - id: correlation_002
    sql: "SELECT marketing_spend, revenue FROM monthly_data"
    schema: [{name: marketing_spend, type: DOUBLE}, {name: revenue, type: DOUBLE}]
    expected_intent: correlation
    expected_chart: scatter
