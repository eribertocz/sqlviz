# sqlviz-inference/rules/semantic_dictionary.yaml
# Maps column name patterns to semantic classes.
# Patterns are matched case-insensitively after normalization.
# Order matters — first match wins.

METRIC_REVENUE:
  exact:
    - revenue
    - ventas
    - ingresos
    - sales
    - income
    - facturacion
    - facturación
    - monto
    - importe
    - amount
    - total_revenue
    - gross_revenue
    - net_revenue
  contains:
    - revenue
    - ventas
    - sales
    - income

METRIC_COUNT:
  exact:
    - count
    - cantidad
    - total
    - num
    - numero
    - número
    - qty
    - quantity
    - units
    - unidades
  contains:
    - count
    - cantidad
    - quantity

METRIC_PROFIT:
  exact:
    - profit
    - ganancia
    - utilidad
    - margen
    - margin
    - benefit
    - beneficio
    - ebitda
    - earnings
  contains:
    - profit
    - ganancia
    - margin
    - margen

