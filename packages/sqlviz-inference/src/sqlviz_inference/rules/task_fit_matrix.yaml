# task_fit_matrix.yaml
# Maps (chart_type, primary_intent) → task fit score [0.0, 1.0].
# Measures how well a chart type serves the analyst's analytical task
# independently of the data signal (that's semantic_fit).
# Based on visualization task taxonomy (Brehmer & Munzner 2013).

