  trend:        0.00
  comparison:   0.00
  ranking:      0.00
  distribution: 0.00
  correlation:  0.00
  composition:  0.00
  anomaly:      0.00
  cohort:       0.00
  retention:    0.00
  funnel:       0.00
  detail:       0.00

line:
  trend:        1.00
  anomaly:      0.85   # time-series anomaly detection uses line
