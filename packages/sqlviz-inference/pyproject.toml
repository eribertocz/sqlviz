[project]
name = "sqlviz-inference"
version = "0.1.0"
description = "SQLviz inference engine: intent, chart, layout, filter, title"
requires-python = ">=3.12"
dependencies = [
    "sqlviz-core",
    "duckdb>=1.0",
    "sqlglot>=25.0",
    "pyyaml>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sqlviz_inference"]

[tool.uv.sources]
sqlviz-core = { workspace = true }
