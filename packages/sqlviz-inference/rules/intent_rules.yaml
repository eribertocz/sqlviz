# sqlviz-inference/rules/intent_rules.yaml
# All intent scoring weights.
# weights must sum to 1.0 per intent.
# boosts are multipliers applied after scoring.

trend:
  description: "How does a metric change over time?"
  weights:
    has_temporal_dimension: 0.40    # dim 31
    has_group_by:           0.25    # dim 0
    has_aggregation:        0.20    # dim 4
    has_order_by:           0.10    # dim 1
    temporal_cardinality:   0.05    # dim 27
  boosts: {}
  penalties:
    no_temporal_dimension: 0.60     # strong penalty if no date

comparison:
  description: "How do categories compare to each other?"
  weights:
    has_group_by:              0.35  # dim 0
    has_aggregation:           0.30  # dim 4
    has_string_column:         0.20  # dim 20
    no_temporal_dimension:     0.10  # (1 - dim 31)
    group_by_column_count:     0.05  # dim 12
  boosts: {}
  penalties:
    no_group_by:    0.50
    has_percentile: 0.70  # §16.33: percentile queries are distribution, not comparison

ranking:
  description: "What are the top/bottom N items?"
  weights:
    has_order_by_desc:  0.40        # dim 2
    has_limit:          0.30        # dim 3
    has_aggregation:    0.20        # dim 4
    has_group_by:       0.10        # dim 0
  boosts:
    order_desc_and_limit: 1.50      # multiplier when both present
  penalties:
    no_order_by_desc: 0.70

distribution:
  description: "How are values distributed?"
  weights:
    has_numeric_column:        0.40  # dim 19
    no_temporal_dimension:     0.30  # (1 - dim 31)
    no_group_by:               0.20  # (1 - dim 0)
    high_cardinality:          0.10  # dim 26 > 0.5
    has_percentile:            0.70  # §16.33: quantile_cont/disc → strong distribution signal
  boosts: {}
  penalties:
    no_numeric_column:   0.80
    has_group_by:        0.50  # grouped+aggregated data is comparison/composition, not raw distribution
    has_window_function: 0.50  # §16.32: window analytics (ranking, retention) ≠ raw distribution

correlation:
  description: "Are two metrics related?"
  weights:
    has_two_numeric_columns:   0.50  # dim 24
    no_group_by:               0.30  # (1 - dim 0)
    no_aggregation:            0.20  # (1 - dim 4)
  boosts: {}
  penalties:
    single_numeric_column: 0.70
    has_aggregation: 0.40
    has_string_column: 0.60   # scatter needs pure numeric columns; string cols → detail

composition:
  description: "What is the part-to-whole breakdown?"
  weights:
    has_group_by:          0.40      # dim 0
    has_aggregation:       0.30      # dim 4
    has_string_column:     0.20      # dim 20
    low_cardinality:       0.10      # few distinct categories (≤3 or <15%)
    part_of_whole_score:   0.10      # §16.21: structural AST + column-name signal; can be negative
  boosts: {}
  penalties:
    high_cardinality: 0.40
    no_aggregation: 0.50
    has_avg: 0.25                    # §16.21: AVG signals comparison, not part-of-whole
    has_percentile: 0.60             # §16.33: percentile queries are distribution, not composition

kpi:
  description: "What is the current value of a metric?"
  weights:
    result_row_count_is_1:     0.30  # dim 35  -- was 0.40; reduced to give room to D0 signals
    result_column_count_is_1:  0.20  # dim 36  -- was 0.30; reduced to give room to D0 signals
    has_aggregation:           0.30  # dim 4   -- was 0.20; increased: detectable in D0
    no_group_by:               0.20  # (1 - dim 0) -- was 0.10; increased: detectable in D0
  boosts: {}
  penalties:
    has_group_by:      0.80   # GROUP BY kills kpi intent
    no_aggregation:    0.30   # no aggregation means no kpi
    # multiple_rows removed (§16.28): multiple_rows = 1 - result_row_count_is_1.
    # In D0 (no data), result_row_count_is_1=0 → multiple_rows=1 → penalty fired on every
    # sql-only query, making kpi unreachable. Absence of data ≠ evidence of multiple rows.
    # In D2 with a real kpi result (1 row), multiple_rows was already 0 — no effect on D2.

anomaly:
  description: "Are there unexpected values in the data?"
  weights:
    has_temporal_dimension:  0.35    # dim 31
    has_aggregation:         0.30    # dim 4
    has_group_by:            0.20    # dim 0
    has_outliers:            0.15    # dim 29
  boosts:
    has_outliers_detected: 1.30
  penalties:
    has_percentile: 0.40             # §16.33: percentile aggregation is planned distribution, not anomaly

cohort:
  description: "How do groups behave over time?"
  weights:
    has_temporal_dimension:  0.35    # dim 31
    has_group_by:            0.30    # dim 0
    group_by_count_gte_2:    0.25    # dim 12 > 0.4
    has_aggregation:         0.10    # dim 4
  boosts: {}
  penalties:
    no_temporal_dimension: 0.60

retention:
  description: "Do users/customers return over time?"
  weights:
    has_temporal_dimension:           0.25    # dim 31
    has_customer_entity:              0.22    # dim 34
    has_window_function:              0.28    # dim 8   (raised: adv_ret_001 needs window to win)
    distinct_entity_count_over_time:  0.21    # §16.30: COUNT(DISTINCT entity) over time
    has_join:                         0.04    # dim 10
  boosts:
    distinct_entity_count_over_time: 1.40    # §16.30: 40% boost — (0.68)×1.40=0.952 > funnel(0.94)
  penalties:
    no_temporal_dimension: 0.70
    no_customer_entity: 0.40

funnel:
  description: "Where do users drop off in a process?"
  weights:
    has_aggregation:         0.45    # dim 4  (was 0.30) — core funnel step-count signal
    has_count:               0.34    # dim 6  (was 0.20) — step-count is primary funnel evidence
    has_group_by:            0.17    # dim 0  (was 0.10) — funnel always groups by step
    has_case_when:           0.01    # dim 16 (was 0.40) — advisory, not mandatory (§16.29)
    is_monotonic_decreasing: 0.03    # §16.29: ASC-ordered step-drop signal
  boosts: {}
  penalties:
    no_case_when: 0.02               # was 0.50 — drastically reduced (§16.29)
    no_group_by:  0.60               # funnel requires GROUP BY by step; without it, likely KPI
    no_count:     0.50               # funnel always counts step volumes; SUM-only → comparison

detail:
  description: "Show me the raw data."
  weights:
    no_aggregation:    0.50          # (1 - dim 4)
    no_group_by:       0.30          # (1 - dim 0)
    high_col_count:    0.20          # dim 13 > 0.3
  boosts: {}
  penalties:
    has_single_numeric_column: 0.50  # single numeric col → distribution, not raw detail
