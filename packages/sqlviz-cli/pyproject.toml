[project]
name = "sqlviz-cli"
dynamic = ["version"]
description = "SQLviz CLI: the `sqlviz` command"
requires-python = ">=3.12"
dependencies = [
    "sqlviz-api",
    "sqlviz-storage",
]

[project.scripts]
sqlviz = "sqlviz_cli.main:main"

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"

[tool.hatch.version.raw-options]
root = "../.."

[tool.hatch.build.targets.wheel]
packages = ["src/sqlviz_cli"]

[tool.uv.sources]
sqlviz-api     = { workspace = true }
sqlviz-storage = { workspace = true }
