name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Run pytest
        run: uv run pytest --tb=short -q

      - name: Lint (ruff)
        run: uv run ruff check packages/

      - name: Type check (mypy)
        run: uv run mypy packages/sqlviz-core/src packages/sqlviz-inference/src packages/sqlviz-storage/src packages/sqlviz-api/src packages/sqlviz-cli/src

  frontend:
    name: Frontend (check + test + build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: packages/sqlviz-web
        run: npm ci

      - name: Type check (svelte-check)
        working-directory: packages/sqlviz-web
        run: npm run check

      - name: Unit tests
        working-directory: packages/sqlviz-web
        run: npm test

      - name: Build
        working-directory: packages/sqlviz-web
        run: npm run build
